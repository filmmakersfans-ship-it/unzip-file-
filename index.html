<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Railway Test Site</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1115 0%, #1a1d24 100%);
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      background: #1e222b;
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      max-width: 480px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      color: #8b5cf6;
    }
    p {
      color: #b3b8c2;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 14px;
      background: #8b5cf620;
      color: #a78bfa;
      border-radius: 999px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 It's alive!</h1>
    <p>This page is being served from a Node/Express app deployed on Railway, connected via GitHub.</p>
    <p>Edit <code>public/index.html</code>, push to GitHub, and watch Railway redeploy automatically.</p>
    <span class="badge">Deployed with Railway</span>
  </div>
</body>
</html>
