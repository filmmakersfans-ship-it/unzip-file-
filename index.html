<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Railway Test Site</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #ff6ec4 0%, #7873f5 50%, #4ade80 100%);
      background-size: 200% 200%;
      animation: gradientShift 10s ease infinite;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      padding: 40px 50px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      max-width: 480px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    p {
      color: #f5f5ff;
      line-height: 1.6;
    }
    code {
      background: rgba(0,0,0,0.2);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.25);
      color: #ffffff;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 It's alive!</h1>
    <p>This page is being served from a Node/Express app deployed on Railway, connected via GitHub.</p>
    <p>Edit <code>index.html</code>, push to GitHub, and watch Railway redeploy automatically.</p>
    <span class="badge">Deployed with Railway</span>
  </div>
</body>
</html>
